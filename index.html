<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
    #hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    #hero h1 { font-size: clamp(2.5rem, 8vw, 6rem); font-weight: 700; letter-spacing: -0.02em; }
    #hero p { margin-top: 1rem; font-size: clamp(1rem, 2.5vw, 1.5rem); color: #888; }
  </style>
</head>
<body>
  <section id="hero">
    <h1 id="title">Portfolio</h1>
    <p id="subtitle">GSAP Animation</p>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    gsap.from('#title', { duration: 1.2, y: 60, opacity: 0, ease: 'power4.out' });
    gsap.from('#subtitle', { duration: 1.2, y: 40, opacity: 0, ease: 'power4.out', delay: 0.3 });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fridec13 — Portfolio</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────── -->
  <header id="header">
    <div class="header-inner">
      <a class="logo" href="#" data-page="home">fridec13</a>
      <nav>
        <a class="nav-link active" href="#" data-page="home">Home</a>
        <a class="nav-link" href="#" data-page="projects">Projects</a>
        <a class="nav-link" href="#" data-page="about">About</a>
      </nav>
    </div>
  </header>

  <!-- ── Main ────────────────────────────────────────────── -->
  <main id="main">

    <!-- Home -->
    <section id="page-home" class="page">
      <div class="hero">
        <p class="hero-label">Hello, I'm</p>
        <h1 class="hero-name">fridec13</h1>
        <p class="hero-desc">Developer &amp; Robotics Enthusiast</p>
      </div>
    </section>

    <!-- Projects -->
    <section id="page-projects" class="page">
      <div class="projects-layout">
        <aside class="projects-sidebar">
          <p class="sidebar-label">Projects</p>
          <ul class="project-list">
            <li class="project-item active" data-project="project1">LeRobot Tutorial</li>
            <li class="project-item" data-project="project2">Jekyll Blog</li>
            <li class="project-item" data-project="project3">GSAP Portfolio</li>
          </ul>
          <div class="panel-dots" id="panel-dots"></div>
        </aside>
        <div class="projects-track-wrapper">
          <div id="projects-track"></div>
        </div>
      </div>
    </section>

    <!-- About -->
    <section id="page-about" class="page">
      <div class="about-layout">
        <div class="about-content">
          <h2 class="about-title">About Me</h2>
          <p>안녕하세요. 로보틱스와 웹 개발에 관심이 많은 개발자입니다.</p>
          <p>오픈소스 라이브러리를 탐구하고, 배운 것을 기록하며 공유하는 것을 좋아합니다.</p>
          <div class="skills">
            <span class="skill-tag">Python</span>
            <span class="skill-tag">PyTorch</span>
            <span class="skill-tag">ROS 2</span>
            <span class="skill-tag">JavaScript</span>
            <span class="skill-tag">Jekyll</span>
            <span class="skill-tag">Linux</span>
            <span class="skill-tag">Git</span>
          </div>
        </div>
      </div>
    </section>

  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="assets/js/script.js"></script>
</body>
</html>
